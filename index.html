<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Sites Preview</title>
<script>
(function() {
  var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
  if (path && path.indexOf('.') === -1) {
    // Try to load the model site
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          document.open();
          document.write(xhr.responseText);
          document.close();
        } else {
          document.getElementById('root').innerHTML = '<h1>Model Site: ' + path + '</h1><p>Site not found. Available models:</p><ul id="models"></ul>';
        }
      }
    };
    xhr.open('GET', '/' + path + '.site/', true);
    xhr.send();
  } else {
    var models = ['alicetorres','alessiadiluca','ambergrace','angelinapellegrini',
      'catalinaainoa','dianareyes','gatitabellavip','juliafoxvip','katymilano',
      'larablake','laurabianchixoxo','nicolevalentina','oliviavaz','paulinalea',
      'rubyvega','sabrinabenitez','tssweetcat','wandacruz'];
    var list = document.getElementById('models');
    if (list) models.forEach(function(m) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '/' + m;
      a.textContent = m;
      li.appendChild(a);
      list.appendChild(li);
    });
  }
})();
</script>
<style>
body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
h1 { font-size: 1.5rem; }
a { color: #0066cc; text-decoration: none; }
a:hover { text-decoration: underline; }
li { margin: 8px 0; }
</style>
</head>
<body>
<div id="root">
<h1>Model Sites Preview</h1>
<p>Loading...</p>
<ul id="models"></ul>
</div>
</body>
</html>
