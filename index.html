<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Sites Preview</title>
<script>
window.addEventListener('DOMContentLoaded', function() {
  var models = ['alicetorres','alessiadiluca','ambergrace','angelinapellegrini',
    'catalinaainoa','dianareyes','gatitabellavip','juliafoxvip','katymilano',
    'larablake','laurabianchixoxo','nicolevalentina','oliviavaz','paulinalea',
    'rubyvega','sabrinabenitez','tssweetcat','wandacruz'];
  var list = document.getElementById('models');
  if (list) {
    models.forEach(function(m) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '/' + m + '/';
      a.textContent = m;
      li.appendChild(a);
      list.appendChild(li);
    });
  }
});
</script>
<style>
body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
h1 { font-size: 1.5rem; }
a { color: #0066cc; text-decoration: none; }
a:hover { text-decoration: underline; }
li { margin: 8px 0; }
</style>
</head>
<body>
<div id="root">
<h1>Model Sites Preview</h1>
<ul id="models"></ul>
</div>
</body>
</html>
